name: Discord powiadomienie o nowym commicie

on:
  push:
    branches:
      - main

jobs:
    Wyslanie-powiadomienia:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Instalacja dependencji
        run: pip install logging typing dotenv requests
        
      - name: Pobierz zmodyfikowane pliki
        id: files
        run: |
          if [ -n "$(git rev-list --count HEAD~1..HEAD 2>/dev/null)" ]; then
            # Pobierz pliki ze zmianami i statystykami per plik
            modified_json=$(git diff --numstat HEAD~1 HEAD 2>/dev/null | \
              awk '{gsub(/-/, "0"); print "{\""$3"\":{\"add\":"$1",\"del\":"$2"}}"}' | \
              jq -s 'add')
            insertions=$(git diff --numstat HEAD~1 HEAD 2>/dev/null | awk '{add += $1} END {print add+0}')
            deletions=$(git diff --numstat HEAD~1 HEAD 2>/dev/null | awk '{del += $2} END {print del+0}')
          else
            modified_json="{}"
            insertions="0"
            deletions="0"
          fi
          echo "modified_json=$modified_json" >> $GITHUB_OUTPUT
          echo "insertions=$insertions" >> $GITHUB_OUTPUT
          echo "deletions=$deletions" >> $GITHUB_OUTPUT
        
      - name: Wysyłanie powiadomienia na Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF: ${{ github.ref }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          MODIFIED_FILES_JSON: ${{ steps.files.outputs.modified_json }}
          COMMIT_INSERTIONS: ${{ steps.files.outputs.insertions }}
          COMMIT_DELETIONS: ${{ steps.files.outputs.deletions }}
          
        run: python .github/Skrypty/discord-powiadomienie.py
